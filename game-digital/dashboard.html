<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — KAFA Kids Learning</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dashboard-page">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-logo">🌟 KAFA Kids</div>
    <div class="topbar-user">
      <div class="user-avatar">👤</div>
      <div class="user-name-short" id="userNameShort">Pelajar</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">🚪 Keluar</button>
  </header>

  <main class="dash-content">

    <!-- New Premium Welcome Card -->
    <div class="welcome-card">
      <div class="avatar-container">
        <span id="welcomeEmoji">👦</span>
      </div>
      <div class="welcome-text-group">
        <h2 id="welcomeName">Hai, Pelajar!</h2>
        <span class="welcome-subtitle">Jom teruskan pembelajaran hari ini</span>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs-row">
      <button class="tab-btn active" onclick="switchTab('belajar', this)">
        <span>🧠</span> Uji Minda
      </button>
      <button class="tab-btn" onclick="switchTab('ranking', this)">
        <span>🏆</span> Ranking
      </button>
    </div>

    <!-- TAB: BELAJAR -->
    <div id="tab-belajar" class="tab-panel active">
      <p class="section-title">📚 Pilih Subjek</p>

      <div class="subject-grid">
        <div class="subject-card" 
             style="--card-color: linear-gradient(135deg,#FF8A65,#FF7043); --card-border: #FF8A65"
             onclick="selectSubject('sirah', this)">
          <span class="subj-icon">🕌</span>
          <div class="subj-name">Sirah</div>
          <span class="subj-badge" style="background:#FF7043">4 Tajuk</span>
        </div>
        <div class="subject-card"
             style="--card-color: linear-gradient(135deg,#42A5F5,#1E88E5); --card-border: #42A5F5"
             onclick="selectSubject('ibadah', this)">
          <span class="subj-icon">🤲</span>
          <div class="subj-name">Ibadah</div>
          <span class="subj-badge" style="background:#1E88E5">Akan Datang</span>
        </div>
        <div class="subject-card"
             style="--card-color: linear-gradient(135deg,#AB47BC,#8E24AA); --card-border: #AB47BC"
             onclick="selectSubject('jawi', this)">
          <span class="subj-icon">✍️</span>
          <div class="subj-name">Jawi</div>
          <span class="subj-badge" style="background:#8E24AA">Akan Datang</span>
        </div>
      </div>

      <!-- Topics by Subject -->
      <div id="topics-container"></div>
    </div>

    <!-- TAB: RANKING -->
    <div id="tab-ranking" class="tab-panel">
      <p class="section-title">🏆 Papan Markah</p>

      <div class="ranking-filter">
        <button class="rank-filter-btn active" onclick="filterRanking('sirah', this)">🕌 Sirah</button>
        <button class="rank-filter-btn" onclick="filterRanking('ibadah', this)">🤲 Ibadah</button>
        <button class="rank-filter-btn" onclick="filterRanking('jawi', this)">✍️ Jawi</button>
      </div>

      <div id="rankingTable" class="ranking-table">
        <div class="rank-header">
          <div>#</div><div>Nama</div><div>Markah</div><div>Masa</div>
        </div>
        <div id="rankingRows">
          <div class="rank-empty">⏳ Memuatkan data ranking...</div>
        </div>
      </div>
      <p style="font-size:0.75rem; color:var(--text-dim); text-align:center; margin-top:0.8rem;">
        💡 Hanya percubaan terbaik dicatat. Data dikemaskini selepas setiap permainan.
      </p>
    </div>

  </main>

  <script src="js/dashboard.js"></script>
</body>
</html>
