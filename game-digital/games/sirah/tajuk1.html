<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tajuk 1: Biodata Nabi ﷺ — KAFA Kids</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body class="game-page">

  <!-- Game Topbar -->
  <header class="game-topbar">
    <button class="game-back-btn" onclick="goBack()">◀ Kembali</button>
    <div class="game-title-bar">🕌 Sirah — Tajuk 1</div>
    <div style="width:80px"></div>
  </header>

  <div class="game-content" id="gameMainContent">

    <!-- Topic Intro -->
    <div id="introScreen">
      <div style="text-align:center; padding:1.5rem 0">
        <div style="font-size:4rem; animation:bounce 1s ease-in-out infinite">📜</div>
        <h1 style="font-family:var(--ff-display); font-size:1.5rem; color:var(--gold); margin:0.8rem 0">
          Biodata Nabi Muhammad ﷺ
        </h1>
        <p style="color:var(--text-dim); font-size:0.88rem; line-height:1.6; margin-bottom:1.5rem">
          Uji kefahaman kamu tentang biodata Nabi Muhammad SAW.<br>
          3 Tahap • 5 Soalan setiap tahap • 20 saat setiap soalan
        </p>
        <div style="display:flex; gap:0.8rem; justify-content:center; flex-wrap:wrap; margin-bottom:1.5rem">
          <span class="level-badge lv1">⭐ Tahap 1</span>
          <span class="level-badge lv2">⭐⭐ Tahap 2</span>
          <span class="level-badge lv3">⭐⭐⭐ Tahap 3</span>
        </div>
        <div id="attemptsInfo" style="background:rgba(255,215,0,0.1); border:1px solid rgba(255,215,0,0.3); border-radius:14px; padding:0.8rem 1rem; margin-bottom:1.5rem; font-size:0.85rem; font-weight:700; color:var(--gold-light)">
          Percubaan: 0 / 2
        </div>
        <button class="signin-btn" style="max-width:280px" onclick="startGame()">
          <span class="btn-text">🎮 Mula Bermain!</span>
        </button>
      </div>
    </div>

    <!-- Game UI (hidden initially) -->
    <div id="gameUI" style="display:none">
      <!-- Level Progress -->
      <div class="levels-bar">
        <div class="level-dot active" id="dot0"></div>
        <div class="level-dot" id="dot1"></div>
        <div class="level-dot" id="dot2"></div>
      </div>

      <!-- Stats -->
      <div class="stats-bar">
        <div class="stat-chip">
          <span class="stat-val" id="scoreVal">0</span>
          <span class="stat-lbl">Markah</span>
        </div>
        <div class="stat-chip">
          <div class="timer-ring-wrap">
            <div class="timer-ring">
              <svg viewBox="0 0 70 70" width="60" height="60">
                <circle class="timer-ring-bg" cx="35" cy="35" r="30"/>
                <circle class="timer-ring-fill" id="timerFill" cx="35" cy="35" r="30"
                  stroke-dasharray="188.5" stroke-dashoffset="0"/>
              </svg>
              <div class="timer-num" id="timerNum">20</div>
            </div>
          </div>
        </div>
        <div class="stat-chip">
          <span class="stat-val" id="levelVal">1</span>
          <span class="stat-lbl">Tahap</span>
        </div>
      </div>

      <!-- Question Card -->
      <div class="question-card">
        <div class="q-progress" id="qProgress">Soalan 1 / 5</div>
        <div class="q-text" id="qText">Memuatkan soalan...</div>
      </div>

      <!-- Options Grid -->
      <div class="options-grid" id="optionsGrid"></div>
    </div>
  </div>

  <script src="../../js/game-engine.js"></script>
  <script>
  // ============================================
  // SOALAN — TAJUK 1: BIODATA NABI MUHAMMAD SAW
  // ============================================
  const SOALAN_T1 = [
    // TAHAP 1 — Asas (mudah)
    [
      {
        soalan: "Siapakah bapa Nabi Muhammad SAW?",
        pilihan: ["Abdullah", "Abu Talib", "Abdul Muttalib", "Abu Lahab"],
        jawapan: "Abdullah"
      },
      {
        soalan: "Siapakah ibu Nabi Muhammad SAW?",
        pilihan: ["Aminah binti Wahab", "Khadijah binti Khuwailid", "Halimah As-Sa'diyah", "Fatimah binti Asad"],
        jawapan: "Aminah binti Wahab"
      },
      {
        soalan: "Siapakah datuk Nabi Muhammad SAW?",
        pilihan: ["Abdul Muttalib", "Abu Talib", "Abdullah", "Umayyah"],
        jawapan: "Abdul Muttalib"
      },
      {
        soalan: "Siapakah isteri pertama Nabi Muhammad SAW?",
        pilihan: ["Khadijah binti Khuwailid", "Aisyah binti Abu Bakar", "Saudah binti Zam'ah", "Hafshah binti Umar"],
        jawapan: "Khadijah binti Khuwailid"
      },
      {
        soalan: "Berapa jumlah anak Nabi Muhammad SAW?",
        pilihan: ["7", "3", "5", "4"],
        jawapan: "7"
      }
    ],
    // TAHAP 2 — Sederhana
    [
      {
        soalan: "Siapakah ibu susuan Nabi Muhammad SAW?",
        pilihan: ["Halimah As-Sa'diyah", "Thuwaibah", "Aminah", "Khadijah"],
        jawapan: "Halimah As-Sa'diyah"
      },
      {
        soalan: "Nabi Muhammad SAW dilahirkan pada hari apa?",
        pilihan: ["Isnin", "Jumaat", "Selasa", "Ahad"],
        jawapan: "Isnin"
      },
      {
        soalan: "Nabi Muhammad SAW dilahirkan pada tahun berapa (Tahun Gajah)?",
        pilihan: ["571 M", "570 M", "572 M", "575 M"],
        jawapan: "571 M"
      },
      {
        soalan: "Nabi Muhammad SAW berasal dari kabilah/bangsa apa?",
        pilihan: ["Quraisy", "Bani Tamim", "Bani Aws", "Bani Khazraj"],
        jawapan: "Quraisy"
      },
      {
        soalan: "Pada tarikh berapakah Nabi Muhammad SAW dilahirkan?",
        pilihan: ["12 Rabiulawal", "10 Muharram", "17 Ramadan", "1 Syawal"],
        jawapan: "12 Rabiulawal"
      }
    ],
    // TAHAP 3 — Sukar
    [
      {
        soalan: "Di manakah Nabi Muhammad SAW dilahirkan?",
        pilihan: ["Makkah Al-Mukarramah", "Madinah Al-Munawwarah", "Taif", "Yaman"],
        jawapan: "Makkah Al-Mukarramah"
      },
      {
        soalan: "Berapakah bilangan anak lelaki Nabi Muhammad SAW?",
        pilihan: ["3", "4", "2", "5"],
        jawapan: "3"
      },
      {
        soalan: "Berapakah bilangan anak perempuan Nabi Muhammad SAW?",
        pilihan: ["4", "3", "2", "5"],
        jawapan: "4"
      },
      {
        soalan: "Apakah nama gelaran Nabi Muhammad SAW yang bermaksud 'yang dipercayai'?",
        pilihan: ["Al-Amin", "Al-Karim", "As-Sadiq", "Al-Hafiz"],
        jawapan: "Al-Amin"
      },
      {
        soalan: "Siapakah bapa kepada ibu Nabi (datuk sebelah ibu)?",
        pilihan: ["Wahab bin Abdul Manaf", "Abdul Muttalib", "Abu Talib", "Harb bin Umayyah"],
        jawapan: "Wahab bin Abdul Manaf"
      }
    ]
  ];

  let game;

  function startGame() {
    if (!game.canPlay()) {
      showNoAttemptsUI();
      return;
    }
    document.getElementById('introScreen').style.display = 'none';
    document.getElementById('gameUI').style.display = 'block';
    game.checkAttemptsAndStart();
  }

  document.addEventListener('DOMContentLoaded', () => {
    if (!sessionStorage.getItem('kafaLoggedIn')) {
      window.location.href = '../../index.html';
      return;
    }
    game = new KafaGame('sirah-t1', 'sirah', SOALAN_T1);
    const remaining = game.getRemainingAttempts();
    document.getElementById('attemptsInfo').innerHTML =
      `🎯 Percubaan tersisa: <strong>${remaining} / 2</strong>`;
    if (!game.canPlay()) {
      document.getElementById('attemptsInfo').style.background = 'rgba(244,67,54,0.15)';
      document.getElementById('attemptsInfo').style.borderColor = 'rgba(244,67,54,0.4)';
      document.getElementById('attemptsInfo').style.color = '#ff8a80';
    }
  });
  </script>
</body>
</html>
