<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Biodata Nabi Muhammad SAW | Game KAFA</title>
  <link rel="stylesheet" href="../../css/game.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>🌙</text></svg>"/>
  <style>
    .game-topbar {
      display: flex; align-items: center; justify-content: space-between;
      background: #fff; border-radius: 16px; padding: 12px 18px;
      box-shadow: 0 4px 24px rgba(26,60,94,0.10); border: 1.5px solid #e2e8f0;
      margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: #f0f4ff; border: 1.5px solid #e2e8f0;
      color: #1a3c5e; border-radius: 10px;
      padding: 7px 14px; font-family: 'Baloo 2', sans-serif;
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
      text-decoration: none; transition: all 0.2s;
    }
    .back-btn:hover { background: #e0e8ff; border-color: #2563a8; }
    .support-btn-wrapper {
      position: fixed; bottom: 20px; right: 20px;
      z-index: 999; display: flex; flex-direction: column;
      align-items: flex-end; gap: 8px;
    }
    .coffee-bubble {
      background: #1a3c5e; color: #fff; border-radius: 12px 12px 2px 12px;
      padding: 7px 12px; font-size: 0.8rem; font-weight: 600;
      box-shadow: 0 4px 24px rgba(26,60,94,0.10); opacity: 0;
      transform: translateY(6px); transition: all 0.25s; pointer-events: none; white-space: nowrap;
    }
    .support-btn-wrapper:hover .coffee-bubble { opacity: 1; transform: translateY(0); }
    .coffee-btn {
      width: 50px; height: 50px; border-radius: 50%;
      background: linear-gradient(135deg, #1a3c5e, #2563a8);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 16px rgba(26,60,94,0.3); transition: all 0.25s; text-decoration: none;
    }
    .coffee-btn:hover { transform: scale(1.1); }
    .coffee-btn svg { width: 24px; height: 24px; }
    .steam { stroke: #fff; stroke-width: 2; stroke-linecap: round; fill: none; }
    .steam-1 { animation: steam 1.8s ease-in-out infinite; }
    .steam-2 { animation: steam 1.8s ease-in-out 0.4s infinite; }
    @keyframes steam {
      0%,100% { transform: translateY(0); opacity: 0.9; }
      50%      { transform: translateY(-6px); opacity: 0.4; }
    }
  </style>
</head>
<body>

<!-- Top Bar -->
<div class="game-topbar" id="gameHeaderInfo">
  <a href="../../index.html" class="back-btn" id="backBtn">← Kembali</a>
  <div class="game-info">
    <h2>Biodata Nabi Muhammad SAW ﷺ</h2>
    <p>Sirah • 3 Tahap • 15 Soalan</p>
  </div>
  <div class="stage-indicator" id="stageDots">
    <div class="stage-dot active" id="stageDot1">T1</div>
    <div class="stage-dot" id="stageDot2">T2</div>
    <div class="stage-dot" id="stageDot3">T3</div>
  </div>
</div>

<!-- Score Bar -->
<div class="score-bar" id="scoreBar">
  <div class="score-item"><div class="s-val">-</div><div class="s-label">Tahap</div></div>
  <div class="score-divider"></div>
  <div class="score-item"><div class="s-val">-</div><div class="s-label">Markah</div></div>
  <div class="score-divider"></div>
  <div class="score-item"><div class="s-val">-</div><div class="s-label">Soalan</div></div>
  <div class="score-divider"></div>
  <div class="score-item"><div class="s-val">-</div><div class="s-label">Saat</div></div>
</div>

<!-- Game Area -->
<div id="gameArea">
  <div style="text-align:center;padding:48px 24px;color:#64748b">
    <div style="font-size:2.5rem;margin-bottom:12px">⏳</div>
    <p>Memuatkan permainan...</p>
  </div>
</div>

<!-- Coffee Support -->
<div class="support-btn-wrapper" id="coffeeWrap">
  <div class="coffee-bubble">Suka web ini? Jom belanja saya kopi! ☕️</div>
  <a href="https://smart-nota.github.io/nota-digital/sokong-saya.html" class="coffee-btn" title="Sokong Kami" target="_blank">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path class="steam steam-1" d="M9 4C9 4 7.5 5.5 9 7C10.5 8.5 9 10 9 10"/>
      <path class="steam steam-2" d="M13 3C13 3 11.5 4.5 13 6C14.5 7.5 13 9 13 9"/>
      <path d="M18 10H4C2.89543 10 2 10.8954 2 12V15C2 18.3137 4.68629 21 8 21H14C17.3137 21 20 18.3137 20 15V12C20 10.8954 19.1046 10 18 10Z" fill="#FFFFFF"/>
      <path d="M20 12C20 12 22 12 22 14.5C22 17 20 17 20 17" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </a>
</div>

<script src="../../js/engine.js"></script>
<script>
// ════════════════════════════════════════
// DATA SOALAN - Biodata Nabi Muhammad SAW
// 15 soalan → 5 soalan per tahap
// ════════════════════════════════════════
window.GAS_URL = 'https://script.google.com/macros/s/AKfycbzbRbwUtfD8gGmsmEJkpbdXeA9LI-52quXfv1Nui6-I_pHbXHz7czX0M4d6YeeX4N-cDQ/exec';

window.GAME_CONFIG = {
  topikId:   'sirah-biodata-nabi',
  topikNama: 'Biodata Nabi Muhammad SAW',
  subjek:    'Sirah',

  // TAHAP 1 (Soalan 1-5): Asas
  soalan: [

    // ── TAHAP 1 ──
    {
      soalan: "Siapakah nama bapa Nabi Muhammad SAW?",
      pilihan: ["Abdullah", "Abdul Mutalib", "Abu Talib", "Aminah"],
      jawapan: "Abdullah"
    },
    {
      soalan: "Siapakah nama ibu Nabi Muhammad SAW?",
      pilihan: ["Aminah binti Wahab", "Khadijah binti Khuwailid", "Halimah binti Abi Zuaib", "Fatimah binti Asad"],
      jawapan: "Aminah binti Wahab"
    },
    {
      soalan: "Siapakah nama datuk Nabi Muhammad SAW yang memeliharanya?",
      pilihan: ["Abdul Mutalib", "Abdullah", "Hashim", "Qusai"],
      jawapan: "Abdul Mutalib"
    },
    {
      soalan: "Siapakah ibu susuan (ibu asuh) Nabi Muhammad SAW?",
      pilihan: ["Halimah binti Abi Zuaib", "Aminah binti Wahab", "Suwaibah al-Aslamiyah", "Ummu Aiman"],
      jawapan: "Halimah binti Abi Zuaib"
    },
    {
      soalan: "Siapakah isteri pertama Nabi Muhammad SAW?",
      pilihan: ["Khadijah binti Khuwailid", "Aisyah binti Abu Bakar", "Saudah binti Zam'ah", "Hafsah binti Umar"],
      jawapan: "Khadijah binti Khuwailid"
    },

    // ── TAHAP 2 ──
    {
      soalan: "Pada tarikh berapakah Nabi Muhammad SAW dilahirkan?",
      pilihan: ["12 Rabiulawal", "1 Muharram", "27 Rejab", "17 Ramadan"],
      jawapan: "12 Rabiulawal"
    },
    {
      soalan: "Pada tahun berapakah (Masihi) Nabi Muhammad SAW dilahirkan?",
      pilihan: ["571 Masihi", "610 Masihi", "622 Masihi", "570 Masihi"],
      jawapan: "571 Masihi"
    },
    {
      soalan: "Apakah nama tahun kelahiran Nabi Muhammad SAW?",
      pilihan: ["Tahun Gajah", "Tahun Unta", "Tahun Kuda", "Tahun Singa"],
      jawapan: "Tahun Gajah"
    },
    {
      soalan: "Di bandar manakah Nabi Muhammad SAW dilahirkan?",
      pilihan: ["Makkah al-Mukarramah", "Madinah al-Munawwarah", "Taif", "Yaman"],
      jawapan: "Makkah al-Mukarramah"
    },
    {
      soalan: "Apakah nama kabilah (bangsa/suku) Nabi Muhammad SAW?",
      pilihan: ["Quraisy", "Khazraj", "Aus", "Tamim"],
      jawapan: "Quraisy"
    },

    // ── TAHAP 3 ──
    {
      soalan: "Berapakah jumlah anak Nabi Muhammad SAW secara keseluruhannya?",
      pilihan: ["7 orang", "5 orang", "4 orang", "6 orang"],
      jawapan: "7 orang"
    },
    {
      soalan: "Apakah nama anak lelaki Nabi Muhammad SAW yang pertama?",
      pilihan: ["Al-Qasim", "Ibrahim", "Abdullah", "Tahir"],
      jawapan: "Al-Qasim"
    },
    {
      soalan: "Apakah nama anak perempuan Nabi Muhammad SAW yang menjadi ibu kepada ramai keturunan?",
      pilihan: ["Fatimah az-Zahra", "Zainab", "Ruqayyah", "Ummu Kulthum"],
      jawapan: "Fatimah az-Zahra"
    },
    {
      soalan: "Siapakah yang memelihara Nabi Muhammad SAW selepas datuknya meninggal dunia?",
      pilihan: ["Abu Talib", "Abdul Mutalib", "Abu Lahab", "Hamzah"],
      jawapan: "Abu Talib"
    },
    {
      soalan: "Pada usia berapakah bapa Nabi Muhammad SAW meninggal dunia sebelum baginda dilahirkan?",
      pilihan: ["Sebelum Nabi dilahirkan", "Ketika Nabi berumur 2 tahun", "Ketika Nabi berumur 6 tahun", "Ketika Nabi berumur 8 tahun"],
      jawapan: "Sebelum Nabi dilahirkan"
    }

  ] // end soalan
};

// ── Auto Hide Coffee During Game ──
document.addEventListener('DOMContentLoaded', () => {
  ENGINE.init();

  // Hide coffee when game starts
  const coffeeWrap = document.getElementById('coffeeWrap');
  if (coffeeWrap) coffeeWrap.style.display = 'none';

  // Patch: show coffee on result screen (called inside engine)
  const origFinal = ENGINE.showFinalResult.bind(ENGINE);
  ENGINE.showFinalResult = function() {
    origFinal();
    if (coffeeWrap) coffeeWrap.style.display = 'flex';
  };
  const origStageResult = ENGINE.showStageResult.bind(ENGINE);
  ENGINE.showStageResult = function(mark) {
    origStageResult(mark);
    // Keep hidden during stage result
  };
});
</script>
</body>
</html>
