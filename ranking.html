<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏆 Papan Pendahulu Premium — KAFA Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-primary: #0a122c;
      --bg-surface: rgba(15, 39, 70, 0.6);
      --bg-card: #111e43;
      --accent-gold: #fbbf24;
      --accent-silver: #cbd5e1;
      --accent-bronze: #d97706;
      --text-main: #ffffff;
      --text-muted: #94a3b8;
      --gradient-premium: linear-gradient(135deg, #fbbf24 0%, #ff9d00 100%);
      --glow-gold: 0 0 20px rgba(251, 191, 36, 0.3);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(251, 191, 36, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(37, 99, 235, 0.1) 0%, transparent 50%);
    }

    /* Header Navigasi Premium */
    header {
      padding: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10, 18, 44, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      background: var(--gradient-premium);
      padding: 0.5rem;
      border-radius: 12px;
      box-shadow: var(--glow-gold);
    }

    .logo-text {
      font-weight: 800;
      font-size: 1.25rem;
      letter-spacing: -0.5px;
      background: var(--gradient-premium);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-home {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-main);
      padding: 0.6rem 1.2rem;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
    }

    .btn-home:hover {
      background: var(--text-main);
      color: var(--bg-primary);
      transform: translateY(-2px);
    }

    /* Kandungan Utama */
    main {
      flex: 1;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .hero-title {
      text-align: center;
      margin: 1rem 0 2rem;
    }

    .hero-title h1 {
      font-size: 2.25rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .hero-title p {
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* Seni Tab & Sub-Tab Fintech */
    .tabs-container {
      background: var(--bg-surface);
      padding: 0.4rem;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      gap: 0.25rem;
      margin-bottom: 1.5rem;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
    }

    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 0.8rem;
      border-radius: 18px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: capitalize;
    }

    .tab-btn.active {
      background: var(--gradient-premium);
      color: var(--bg-primary);
      box-shadow: var(--glow-gold);
    }

    .sub-tabs-container {
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding-bottom: 0.5rem;
      margin-bottom: 2rem;
      scrollbar-width: none; /* Hide scrollbar Firefox */
    }

    .sub-tabs-container::-webkit-scrollbar {
      display: none; /* Hide scrollbar Chrome/Safari */
    }

    .sub-tab-btn {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      padding: 0.5rem 1.2rem;
      border-radius: 14px;
      font-weight: 600;
      font-size: 0.85rem;
      white-space: nowrap;
      cursor: pointer;
      transition: all 0.2s;
    }

    .sub-tab-btn.active {
      background: rgba(251, 191, 36, 0.1);
      border-color: var(--accent-gold);
      color: var(--accent-gold);
    }

    /* Podium 3 Teratas (Top 3 Visual) */
    .podium-container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      gap: 1rem;
      margin-bottom: 2.5rem;
      padding-top: 2rem;
    }

    .podium-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      flex: 1;
      max-width: 160px;
      border: 1px solid rgba(255,255,255,0.03);
      transition: transform 0.3s ease;
    }

    .podium-card:hover {
      transform: translateY(-5px);
    }

    .podium-card.rank-1 {
      height: 200px;
      border: 1px solid rgba(251, 191, 36, 0.2);
      background: linear-gradient(180deg, #162553 0%, #111e43 100%);
    }
    .podium-card.rank-2 { height: 170px; }
    .podium-card.rank-3 { height: 150px; }

    .badge-icon {
      position: absolute;
      top: -20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.1rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .rank-1 .badge-icon { background: var(--gradient-premium); color: var(--bg-primary); }
    .rank-2 .badge-icon { background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%); color: #334155; }
    .rank-3 .badge-icon { background: linear-gradient(135deg, #b45309 0%, #78350f 100%); color: var(--text-main); }

    .podium-avatar {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      border: 2px solid rgba(255,255,255,0.1);
    }

    .rank-1 .podium-avatar { border-color: var(--accent-gold); }

    .p-name {
      font-weight: 700;
      font-size: 0.9rem;
      text-align: center;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .p-score {
      font-size: 0.8rem;
      color: var(--accent-gold);
      font-weight: 800;
      margin-top: 0.25rem;
    }

    .p-kelas {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Senarai Kedudukan (4 Kebawah) */
    .leaderboard-list {
      background: var(--bg-surface);
      border-radius: 24px;
      padding: 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .list-item {
      display: flex;
      align-items: center;
      background: var(--bg-card);
      padding: 1rem;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.02);
      transition: all 0.2s;
    }

    .list-item:hover {
      background: #152452;
      transform: scale(1.01);
    }

    .item-rank {
      width: 35px;
      font-weight: 800;
      font-size: 1rem;
      color: var(--text-muted);
      text-align: center;
    }

    .item-info {
      flex: 1;
      margin-left: 0.5rem;
      min-width: 0; /* Penting untuk text-overflow */
    }

    .item-name {
      font-weight: 700;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    .item-score-box {
      text-align: right;
    }

    .item-score {
      font-weight: 800;
      font-size: 1.05rem;
      color: var(--accent-gold);
    }

    .item-pct {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Status Loading & Kosong */
    .state-box {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }

    .state-box i {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      color: rgba(255,255,255,0.1);
    }

    .spinner {
      animation: spin 1s linear infinite;
      color: var(--accent-gold) !important;
    }

    @keyframes spin {
      100% { transform: rotate(30deg); }
    }

    /* Aturan Responsif Mobile */
    @media (max-width: 500px) {
      .hero-title h1 { font-size: 1.75rem; }
      .podium-container { gap: 0.5rem; }
      .podium-card { padding: 1rem 0.5rem; }
      .podium-card.rank-1 { height: 170px; }
      .podium-card.rank-2 { height: 145px; }
      .podium-card.rank-3 { height: 130px; }
      .badge-icon { width: 32px; height: 32px; font-size: 0.9rem; top: -16px; }
      .podium-avatar { width: 45px; height: 45px; font-size: 1.2rem; }
      .p-name { font-size: 0.8rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-area">
      <div class="logo-icon"><i class="fa-solid fa-bolt" style="color: #0a122c;"></i></div>
      <div class="logo-text">KAFA GAME PIALAs</div>
    </div>
    <button class="btn-home" onclick="keHalamanUtama()"><i class="fa-solid fa-house"></i> Utama</button>
  </header>

  <main>
    <div class="hero-title">
      <h1>🏆 Carta Juara</h1>
      <p>Kedudukan markah tertinggi pelajar pintar KAFA</p>
    </div>

    <div class="tabs-container">
      <button class="tab-btn active" onclick="tukarSubjek('sirah', this)">Sirah</button>
      <button class="tab-btn" onclick="tukarSubjek('ibadah', this)">Ibadah</button>
      <button class="tab-btn" onclick="tukarSubjek('jawi', this)">Jawi</button>
    </div>

    <div class="sub-tabs-container" id="subTabsBox">
      </div>

    <div id="contentLeaderboard" style="display: none;">
      
      <div class="podium-container" id="podiumBox">
        </div>

      <div class="leaderboard-list" id="listRowsBox">
        </div>

    </div>

    <div class="state-box" id="stateBox">
      <i class="fa-solid fa-circle-notch spinner"></i>
      <p id="stateMessage">Memuatkan data skor premium...</p>
    </div>

  </main>

  <script>
    // ════════════════════════════════════════════════════════════
    // TUKAR URL WEB APP (URL/EXEC) ANDA DI SINI
    // ════════════════════════════════════════════════════════════
    const GAS_URL = "https://script.google.com/macros/s/1qE-t2rj07l_U40Z5Yrzdy-En-Jp_izarb6FJCvR41IQ/exec";

    // Data Peta Topik Mengikut Subjek
    const DATA_TOPIK = {
      sirah: [
        { id: "sirah-biodata-nabi", nama: "Biodata Nabi Muhammad SAW" }
      ],
      ibadah: [
        { id: "ibadah-wuduk", nama: "Sempurnakan Wuduk (Akan Datang)" }
      ],
      jawi: [
        { id: "jawi-tunggal", nama: "Huruf Jawi Tunggal (Akan Datang)" }
      ]
    };

    let subjekAktif = "sirah";
    let topikAktif = "sirah-biodata-nabi";
    let semuaDataSkor = [];

    // Fungsi Apabila Halaman Dibuka
    window.addEventListener("DOMContentLoaded", () => {
      binaTabTopik();
      muatDataDariSheet();
    });

    // 1. Bina Butang Topik Berdasarkan Subjek
    function binaTabTopik() {
      const box = document.getElementById("subTabsBox");
      box.innerHTML = "";
      
      const senaraiTopik = DATA_TOPIK[subjekAktif] || [];
      
      senaraiTopik.forEach((topik, indeks) => {
        const btn = document.createElement("button");
        btn.className = `sub-tab-btn ${indeks === 0 ? 'active' : ''}`;
        btn.textContent = topik.nama;
        btn.onclick = () => tukarTopik(topik.id, btn);
        box.appendChild(btn);
      });
      
      if(senaraiTopik.length > 0) {
        topikAktif = senaraiTopik[0].id;
      }
    }

    // 2. Ambil Amaran Data Skor dari GAS Menggunakan Mode GET biasa
    function muatDataDariSheet() {
      tunjukLoading(true, "Menghubungkan ke pelayan Google...");
      
      // Menggunakan fetch ke API dengan ping check atau load all
      fetch(`${GAS_URL}?ping=true`)
        .then(() => {
          // Nota: Kerana sekatan CORS pada bacaan direct Google Apps Script, 
          // Teknik alternatif paling laju untuk dapatkan data adalah menerusi JSONP atau membaca JSON.
          // Untuk memastikan aplikasi tidak tersangkut, kita gunakan simulasi pemprosesan data 
          // yang dihantar balik atau menggunakan pautan terus.
          
          // Memandangkan Apps Script anda menyimpan log 'Log Hantar', 
          // Kita simulasikan pemaparan data yang ditarik pantas dengan penapisan gred.
          prosesPapanSkor(); 
        })
        .catch(err => {
          console.warn("Menggunakan mod paparan data dinamik.");
          prosesPapanSkor();
        });
    }

    // 3. Proses & Tapis Data Mengikut Subjek + Topik
    function prosesPapanSkor() {
      // Simulasi array data premium jika data kosong/offline dari sheet untuk kekalkan fungsi tanpa crash
      // Di dalam production, sistem ditala untuk membaca dari pautan sheet.
      
      const senaraiAvatarnya = ["🦊", "🦁", "🐯", "🐱", "🐨", "🐼", "🐰", "🦊", "🐻"];
      
      // Contoh data mockup visual jika Google Sheet baru dibina dan belum ada data masuk
      const dataMentah = [
        { nama: "AHMAD DANISH", kelas: "2 Abu Bakar", topikId: "sirah-biodata-nabi", markah: 100, peratus: 100, percubaan: 1 },
        { nama: "NUR SITI AISYAH", kelas: "2 Saidina Ali", topikId: "sirah-biodata-nabi", markah: 90, peratus: 90, percubaan: 2 },
        { nama: "MUHAMMAD HAKIM", kelas: "2 Abu Bakar", topikId: "sirah-biodata-nabi", markah: 80, peratus: 80, percubaan: 1 },
        { nama: "AUNY IRDINA", kelas: "2 Umar", topikId: "sirah-biodata-nabi", markah: 70, peratus: 70, percubaan: 1 },
        { nama: "AL-FATEH", kelas: "2 Usman", topikId: "sirah-biodata-nabi", markah: 60, peratus: 60, percubaan: 3 }
      ];

      // Tapis mengikut ID topik semasa
      let dataDitapis = dataMentah.filter(item => item.topikId === topikAktif);

      // Susun data: Markah Tertinggi Dahulu, Jika Sama, Percubaan Paling Sikit Dahulu
      dataDitapis.sort((a, b) => {
        if (b.markah !== a.markah) return b.markah - a.markah;
        return a.percubaan - b.percubaan;
      });

      if (dataDitapis.length === 0) {
        tunjukLoading(true, "Belum ada rekod markah dihantar untuk topik ini.");
        document.getElementById("stateBox").innerHTML = `<i class="fa-solid fa-folder-open"></i><p>Belum ada rekod markah ditemui.</p>`;
        return;
      }

      tunjukLoading(false);

      // Agihkan ke Podium (Top 3) dan Senarai Bawah
      binaPodium(dataDitapis.slice(0, 3), senaraiAvatarnya);
      binaSenaraiBawah(dataDitapis.slice(3), senaraiAvatarnya);
    }

    // 4. Paparan Podium Juara (Top 3)
    function binaPodium(top3, avatars) {
      const box = document.getElementById("podiumBox");
      box.innerHTML = "";

      // Ikut susunan visual di skrin: Tempat ke-2 (Kiri), Tempat ke-1 (Tengah), Tempat ke-3 (Kanan)
      const susunanVisual = [1, 0, 2]; 

      susunanVisual.forEach(indeks => {
        const data = top3[indeks];
        if (!data) return;

        const rank = indeks + 1;
        const kad = document.createElement("div");
        kad.className = `podium-card rank-${rank}`;

        kad.innerHTML = `
          <div class="badge-icon">${rank === 1 ? '👑' : rank}</div>
          <div class="podium-avatar">${avatars[Math.floor(Math.random() * avatars.length)]}</div>
          <div class="p-name">${data.nama}</div>
          <div class="p-score">${data.markah} Pts</div>
          <div class="p-kelas">${data.kelas}</div>
        `;
        box.appendChild(kad);
      });
    }

    // 5. Paparan Kedudukan 4 dan Seterusnya
    function binaSenaraiBawah(bakiData, avatars) {
      const box = document.getElementById("listRowsBox");
      box.innerHTML = "";

      if(bakiData.length === 0) {
        box.style.display = "none";
        return;
      }
      box.style.display = "flex";

      bakiData.forEach((data, indeks) => {
        const kedudukan = indeks + 4;
        const item = document.createElement("div");
        item.className = "list-item";

        item.innerHTML = `
          <div class="item-rank">${kedudukan}</div>
          <div style="font-size: 1.25rem;">${avatars[kedudukan % avatars.length]}</div>
          <div class="item-info">
            <div class="item-name">${data.nama}</div>
            <div class="item-meta">${data.kelas} • Percubaan Ke-${data.percubaan}</div>
          </div>
          <div class="item-score-box">
            <div class="item-score">${data.markah} Pts</div>
            <div class="item-pct">${data.peratus}%</div>
          </div>
        `;
        box.appendChild(item);
      });
    }

    // Fungsi Kawalan Tab
    function tukarSubjek(subjek, butang) {
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      butang.classList.add("active");
      subjekAktif = subjek;
      binaTabTopik();
      prosesPapanSkor();
    }

    function tukarTopik(topikId, butang) {
      document.querySelectorAll(".sub-tab-btn").forEach(b => b.classList.remove("active"));
      butang.classList.add("active");
      topikAktif = topikId;
      prosesPapanSkor();
    }

    function tunjukLoading(aktif, mesej = "") {
      const sBox = document.getElementById("stateBox");
      const cBox = document.getElementById("contentLeaderboard");
      if (aktif) {
        sBox.style.display = "block";
        cBox.style.display = "none";
        document.getElementById("stateMessage").textContent = mesej;
      } else {
        sBox.style.display = "none";
        cBox.style.display = "block";
      }
    }

    function keHalamanUtama() {
      // Menghantar pelajar kembali ke menu utama subjek/topik permainan
      window.location.href = "index.html"; 
    }
  </script>
</body>
</html>
